# 端口号(80, 88, 443 or 8443)
port: 8443

# 桶数量
bucket_num: 16

# 服务域名
domain: "YOURDOMAIN"

# API服务站点
api_website: "https://api.telegram.org/"

# 机器人token
token: "YOURTOKEN"

# 动态配置文件
dynamic: "dynamic.yml"

# 语言包路径
languages: "languages"

# BoltDB路径
boltdb_path: "master.db"

# 监控服务地址
monitor_url: "http://127.0.0.1:18080/"

# 数据库配置
sqlite:
  # 数据库名
  db: "sqlitedb/casinologs.db"
